urdf_controller:
  # Publish all joint states -----------------------------------
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 50

  # Position Controllers --------------------------------------
  right_knee_joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: right_knee_joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
  right_idler_wheel_joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: right_idler_wheel_joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
  left_thigh_joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: left_thigh_joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
  right_thigh_joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: right_thigh_joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
  right_wheel_joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: right_wheel_joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
  left_knee_joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: left_knee_joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
  left_wheel_joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: left_wheel_joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
  left_idler_wheel_joint_position_controller:
    type: effort_controllers/JointPositionController
    joint: left_idler_wheel_joint
    pid: {p: 100.0, i: 0.01, d: 10.0}
